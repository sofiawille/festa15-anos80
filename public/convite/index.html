  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

  <style>
    :root {
      --disco-bg: #121212;
      --disco-bg2: #0a0a0a;
      --disco-red: #FF2A2A;
      --disco-orange: #FF7F00;
      --disco-yellow: #FFE500;
      --disco-teal: #00F0FF;
      --disco-beige: #F5E6CA;
      --disco-pink: #FF1493;
      --disco-purple: #9D00FF;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      font-family: 'DM Sans', sans-serif;
      color: var(--disco-beige);
      background: #000;
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
    }

    /* ============ STAGE ============ */
    .stage {
      position: relative;
      width: 100%;
      min-height: 100vh;
      max-width: 480px;
      margin: 0 auto;
      overflow: hidden;
      background-color: var(--disco-bg);
      background-image:
        radial-gradient(circle at 50% 88%, rgba(0, 240, 255, 0.08) 0%, transparent 55%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
    }

    /* Synthwave grid floor */
    .grid-floor {
      position: absolute;
      bottom: -10px;
      left: -20%;
      right: -20%;
      height: 50%;
      background-image:
        linear-gradient(to right, rgba(0, 240, 255, 0.25) 1px, transparent 1px),
        linear-gradient(to top, rgba(0, 240, 255, 0.25) 1px, transparent 1px);
      background-size: 60px 40px;
      transform: perspective(500px) rotateX(60deg);
      transform-origin: bottom;
      mask-image: linear-gradient(to top, black 0%, transparent 100%);
      -webkit-mask-image: linear-gradient(to top, black 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* Grain noise overlay */
    .grain {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 50;
      opacity: 0.06;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' /%3E%3C/filter%3E%3Crect width='200' height='200' filter='url(%23n)' /%3E%3C/svg%3E");
    }

    /* Floating stickers */
    .sticker-bg {
      position: absolute;
      pointer-events: none;
      z-index: 1;
    }
    @keyframes float-slow {
      0%, 100% { transform: translateY(0) rotate(var(--r, 0deg)); }
      50% { transform: translateY(-12px) rotate(calc(var(--r, 0deg) + 5deg)); }
    }
    @keyframes spin-y {
      0% { transform: rotateY(0deg); }
      100% { transform: rotateY(360deg); }
    }
    @keyframes pulse-glow {
      0%, 100% { filter: drop-shadow(0 0 6px var(--glow, #FF2A2A)) drop-shadow(0 0 12px var(--glow, #FF2A2A)); }
      50% { filter: drop-shadow(0 0 12px var(--glow, #FF2A2A)) drop-shadow(0 0 24px var(--glow, #FF2A2A)); }
    }
    .sticker-bg.float { animation: float-slow 6s ease-in-out infinite; }
    .sticker-bg.spin { animation: spin-y 4s linear infinite; transform-style: preserve-3d; }
    .sticker-bg.glow { animation: pulse-glow 2.5s ease-in-out infinite; }

    /* ============ HEADER ============ */
    .top-label {
      font-family: 'Righteous', sans-serif;
      color: var(--disco-orange);
      font-size: 14px;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      margin-bottom: 8px;
      text-shadow: 0 0 8px rgba(255, 127, 0, 0.6);
      z-index: 5;
      position: relative;
      animation: pulse-text 2s ease-in-out infinite;
    }
    @keyframes pulse-text {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    .top-title {
      font-family: 'Monoton', cursive;
      font-size: 48px;
      letter-spacing: 4px;
      line-height: 1;
      text-align: center;
      background: linear-gradient(180deg, #FF2A2A 0%, #FF7F00 50%, #FFE500 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 12px rgba(255, 42, 42, 0.5));
      margin: 6px 0 28px;
      z-index: 5;
      position: relative;
    }
    @media (min-width: 380px) {
      .top-title { font-size: 56px; }
    }

    /* ============ VITROLA (TURNTABLE) ============ */
    .vitrola-wrap {
      position: relative;
      z-index: 5;
      perspective: 800px;
    }

    .vitrola {
      position: relative;
      width: 260px;
      height: 200px;
      cursor: pointer;
      animation: gentleBob 4s ease-in-out infinite;
      transition: transform 0.2s ease;
    }
    .vitrola:active { transform: scale(0.97); }
    .vitrola.opening { animation: shakePlay 0.5s ease-in-out; pointer-events: none; }

    @keyframes gentleBob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    @keyframes shakePlay {
      0%, 100% { transform: translateX(0) rotate(0); }
      25% { transform: translateX(-4px) rotate(-1.5deg); }
      75% { transform: translateX(4px) rotate(1.5deg); }
    }

    /* Turntable base — dark rectangle with neon teal outline */
    .vitrola-base {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #1f1f1f 0%, #0a0a0a 100%);
      border: 3px solid var(--disco-teal);
      border-radius: 14px;
      box-shadow:
        0 0 14px rgba(0, 240, 255, 0.55),
        0 0 28px rgba(0, 240, 255, 0.25),
        inset 0 0 20px rgba(0, 0, 0, 0.6);
    }

    /* Inner recess holding the vinyl */
    .platter {
      position: absolute;
      left: 18px;
      top: 18px;
      width: 164px;
      height: 164px;
      background: #050505;
      border-radius: 50%;
      box-shadow:
        inset 0 0 14px rgba(0, 0, 0, 0.9),
        inset 0 2px 4px rgba(255, 255, 255, 0.05);
    }

    /* The vinyl record with concentric grooves */
    .vinyl {
      position: absolute;
      left: 22px;
      top: 22px;
      width: 156px;
      height: 156px;
      border-radius: 50%;
      background:
        repeating-radial-gradient(
          circle at center,
          #1f1f1f 0px,
          #1f1f1f 1.5px,
          #050505 1.5px,
          #050505 3px
        );
      animation: vinyl-spin 5s linear infinite;
      box-shadow:
        0 2px 6px rgba(0, 0, 0, 0.5),
        inset 0 0 3px rgba(255, 255, 255, 0.05);
    }
    @keyframes vinyl-spin {
      to { transform: rotate(360deg); }
    }
    .opening .vinyl {
      animation: vinyl-spin 0.8s linear infinite;
    }

    /* Center label */
    .vinyl-label {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #FF7F00, #FF2A2A 50%, #8a0a0a 100%);
      transform: translate(-50%, -50%);
      box-shadow:
        0 0 6px rgba(255, 42, 42, 0.7),
        inset 0 0 4px rgba(255, 229, 0, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .vinyl-label-text {
      font-family: 'Monoton', cursive;
      font-size: 10px;
      color: var(--disco-yellow);
      letter-spacing: 1.5px;
      text-shadow: 0 0 3px rgba(0, 0, 0, 0.6);
      line-height: 1;
    }

    /* Center hole */
    .vinyl-hole {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: #000;
      transform: translate(-50%, -50%);
      z-index: 2;
    }

    /* Tonearm SVG */
    .tonearm {
      position: absolute;
      right: 8px;
      top: 6px;
      width: 86px;
      height: 110px;
      pointer-events: none;
      transform-origin: 84% 14%;
      transform: rotate(0deg);
      transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 3;
      filter: drop-shadow(0 1px 2px rgba(0, 0, 0, 0.7));
    }
    .opening .tonearm {
      transform: rotate(-26deg);
    }

    /* LED indicator */
    .led {
      position: absolute;
      right: 16px;
      bottom: 14px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--disco-red);
      box-shadow:
        0 0 6px var(--disco-red),
        0 0 12px rgba(255, 42, 42, 0.6);
      animation: led-pulse 1.6s ease-in-out infinite;
      z-index: 2;
    }
    @keyframes led-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .opening .led { animation-duration: 0.4s; }

    /* Control knobs */
    .knob {
      position: absolute;
      width: 13px;
      height: 13px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #555, #1a1a1a);
      border: 1.5px solid #2a2a2a;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.6);
      z-index: 2;
    }
    .knob.k1 { right: 38px; bottom: 12px; }
    .knob.k2 { right: 60px; bottom: 12px; }
    .knob::after {
      content: '';
      position: absolute;
      left: 50%;
      top: 1.5px;
      width: 1px;
      height: 4px;
      background: var(--disco-teal);
      transform: translateX(-50%);
      box-shadow: 0 0 2px var(--disco-teal);
    }

    /* Tap hint — neon glow */
    .tap-hint {
      font-family: 'Great Vibes', cursive;
      color: var(--disco-teal);
      font-size: 28px;
      margin-top: 28px;
      text-align: center;
      text-shadow:
        0 0 6px var(--disco-teal),
        0 0 12px rgba(0, 240, 255, 0.6);
      animation: pulse 1.6s ease-in-out infinite;
      z-index: 5;
      position: relative;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.06); opacity: 0.85; }
    }
    .tap-hint.hide {
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.4s ease;
      pointer-events: none;
    }

    /* ============ INVITE CARD (reveal) ============ */
    .invite-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }
    .invite-overlay.show {
      opacity: 1;
      pointer-events: all;
    }

    .invite-card {
      transform: scale(0) rotate(-30deg);
      transition: transform 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s;
      width: 100%;
      max-width: 360px;
    }
    .invite-overlay.show .invite-card {
      transform: scale(1) rotate(-1deg);
    }

    .card-inner {
      background:
        linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
      border: 3px solid var(--disco-teal);
      border-radius: 18px;
      padding: 26px 20px 22px;
      box-shadow:
        0 0 20px rgba(0, 240, 255, 0.5),
        0 0 40px rgba(0, 240, 255, 0.2),
        inset 0 0 30px rgba(0, 240, 255, 0.05);
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    /* Memphis dots scattered on card */
    .card-inner::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(circle at 12% 18%, var(--disco-red) 1.5px, transparent 2.5px),
        radial-gradient(circle at 88% 15%, var(--disco-teal) 1.5px, transparent 2.5px),
        radial-gradient(circle at 15% 80%, var(--disco-yellow) 1.5px, transparent 2.5px),
        radial-gradient(circle at 85% 82%, var(--disco-orange) 1.5px, transparent 2.5px),
        radial-gradient(circle at 50% 92%, var(--disco-pink) 1px, transparent 2px);
      background-size: 100% 100%;
      pointer-events: none;
      opacity: 0.65;
    }

    /* Neon gradient stripe at top */
    .card-stripe {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg,
        var(--disco-red) 0%,
        var(--disco-orange) 25%,
        var(--disco-yellow) 50%,
        var(--disco-teal) 75%,
        var(--disco-pink) 100%);
      box-shadow: 0 0 10px rgba(255, 42, 42, 0.6);
    }

    /* Corner decorations */
    .card-corner {
      position: absolute;
      width: 30px;
      height: 30px;
    }
    .card-corner.tl { top: 14px; left: 12px; }
    .card-corner.tr { top: 14px; right: 12px; }
    .card-corner.bl { bottom: 14px; left: 12px; }
    .card-corner.br { bottom: 14px; right: 12px; }

    .card-pretitle {
      font-family: 'Righteous', sans-serif;
      color: var(--disco-orange);
      font-size: 11px;
      letter-spacing: 3px;
      margin: 8px 0 6px;
      text-transform: uppercase;
      text-shadow: 0 0 6px rgba(255, 127, 0, 0.6);
      position: relative;
      z-index: 2;
    }

    .card-anos {
      font-family: 'Monoton', cursive;
      font-size: 32px;
      letter-spacing: 4px;
      line-height: 1;
      background: linear-gradient(180deg, #FF2A2A 0%, #FF7F00 50%, #FFE500 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 10px rgba(255, 42, 42, 0.5));
      margin: 4px 0 6px;
      position: relative;
      z-index: 2;
    }

    .card-name {
      font-family: 'Great Vibes', cursive;
      color: var(--disco-teal);
      font-size: 72px;
      line-height: 0.9;
      margin: 4px 0 10px;
      text-shadow:
        0 0 8px var(--disco-teal),
        0 0 16px rgba(0, 240, 255, 0.7),
        0 0 24px rgba(0, 240, 255, 0.4);
      transform: rotate(-3deg);
      display: inline-block;
      position: relative;
      z-index: 2;
    }

    .card-divider {
      display: flex;
      justify-content: center;
      gap: 4px;
      margin: 12px 0;
      position: relative;
      z-index: 2;
    }
    .card-divider > div {
      height: 4px;
      border-radius: 2px;
      box-shadow: 0 0 6px currentColor;
    }

    /* Date pill — yellow neon */
    .card-date {
      background: rgba(0, 0, 0, 0.6);
      border: 2px solid var(--disco-yellow);
      border-radius: 12px;
      padding: 10px 14px;
      margin: 4px auto 14px;
      max-width: 280px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      box-shadow:
        0 0 10px rgba(255, 229, 0, 0.5),
        inset 0 0 8px rgba(255, 229, 0, 0.1);
      position: relative;
      z-index: 2;
    }
    .card-date-day {
      font-family: 'Monoton', cursive;
      font-size: 44px;
      color: var(--disco-red);
      line-height: 1;
      text-shadow:
        0 0 6px var(--disco-red),
        0 0 12px rgba(255, 42, 42, 0.5);
    }
    .card-date-info { text-align: left; }
    .card-date-month {
      font-family: 'Monoton', cursive;
      font-size: 16px;
      color: var(--disco-orange);
      letter-spacing: 2px;
      line-height: 1;
      text-shadow: 0 0 4px rgba(255, 127, 0, 0.6);
    }
    .card-date-year {
      font-family: 'Righteous', sans-serif;
      font-size: 13px;
      color: var(--disco-yellow);
      letter-spacing: 2px;
      margin-top: 3px;
      text-shadow: 0 0 4px rgba(255, 229, 0, 0.5);
    }
    .card-date-time {
      font-family: 'DM Sans', sans-serif;
      font-weight: 700;
      font-size: 12px;
      color: var(--disco-teal);
      margin-top: 1px;
      text-shadow: 0 0 4px rgba(0, 240, 255, 0.5);
    }

    .card-location {
      font-family: 'Righteous', sans-serif;
      color: var(--disco-beige);
      font-size: 18px;
      line-height: 1.15;
      margin: 6px 0 4px;
      text-shadow: 0 0 4px rgba(245, 230, 202, 0.3);
      position: relative;
      z-index: 2;
    }
    .card-address {
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      color: var(--disco-beige);
      opacity: 0.7;
      margin-bottom: 12px;
      position: relative;
      z-index: 2;
    }

    .card-dress {
      background: rgba(255, 42, 42, 0.12);
      color: var(--disco-red);
      border: 2px solid var(--disco-red);
      border-radius: 999px;
      padding: 6px 18px;
      font-family: 'Righteous', sans-serif;
      font-size: 11px;
      letter-spacing: 3px;
      display: inline-block;
      margin: 4px 0 16px;
      text-transform: uppercase;
      box-shadow:
        0 0 8px rgba(255, 42, 42, 0.4),
        inset 0 0 8px rgba(255, 42, 42, 0.1);
      text-shadow: 0 0 4px rgba(255, 42, 42, 0.6);
      position: relative;
      z-index: 2;
    }

    .card-cta {
      display: block;
      background: transparent;
      color: var(--disco-red);
      border: 2px solid var(--disco-red);
      border-radius: 999px;
      padding: 14px 16px;
      font-family: 'Righteous', sans-serif;
      font-size: 13px;
      letter-spacing: 2px;
      text-decoration: none;
      box-shadow:
        0 0 12px rgba(255, 42, 42, 0.5),
        inset 0 0 12px rgba(255, 42, 42, 0.1);
      text-shadow:
        0 0 6px var(--disco-red),
        0 0 12px rgba(255, 42, 42, 0.5);
      margin-bottom: 8px;
      text-transform: uppercase;
      transition: all 0.2s ease;
      position: relative;
      z-index: 2;
    }
    .card-cta:hover, .card-cta:active {
      background: rgba(255, 42, 42, 0.15);
      box-shadow:
        0 0 20px rgba(255, 42, 42, 0.8),
        inset 0 0 20px rgba(255, 42, 42, 0.2);
    }

    .card-link {
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      font-size: 11px;
      color: var(--disco-teal);
      opacity: 0.75;
      letter-spacing: 0.5px;
      word-break: break-all;
      position: relative;
      z-index: 2;
    }
  </style>
</head>
<body>
  <main class="stage" id="stage">
    <div class="grid-floor"></div>

    <!-- BACKGROUND STICKERS -->
    <!-- Top-left: lightning bolt -->
    <svg class="sticker-bg float glow" style="top: 8%; left: 6%; --r: -10deg; --glow: #FFE500; width: 44px;" viewBox="0 0 24 24" fill="#FFE500"><polygon points="13,2 4,14 11,14 9,22 20,9 13,9"/></svg>

    <!-- Top-right: disco ball -->
    <svg class="sticker-bg spin glow" style="top: 12%; right: 10%; --glow: #00F0FF; width: 56px;" viewBox="0 0 24 24"><defs><radialGradient id="db1" cx="35%" cy="35%"><stop offset="0%" stop-color="#F5E6CA"/><stop offset="40%" stop-color="#00F0FF"/><stop offset="100%" stop-color="#1a1a1a"/></radialGradient></defs><circle cx="12" cy="12" r="10" fill="url(#db1)" stroke="#00F0FF" stroke-width="1"/><line x1="2" y1="12" x2="22" y2="12" stroke="#1a1a1a" stroke-width="0.4"/><line x1="12" y1="2" x2="12" y2="22" stroke="#1a1a1a" stroke-width="0.4"/><ellipse cx="12" cy="12" rx="10" ry="3" fill="none" stroke="#1a1a1a" stroke-width="0.4"/><ellipse cx="12" cy="12" rx="10" ry="6" fill="none" stroke="#1a1a1a" stroke-width="0.4"/></svg>

    <!-- Middle-left: star -->
    <svg class="sticker-bg float glow" style="top: 28%; left: 4%; --r: 12deg; --glow: #FF2A2A; width: 38px; animation-delay: -2s;" viewBox="0 0 24 24" fill="#FF2A2A"><polygon points="12,2 14.5,9 22,9 16,13.5 18.5,21 12,16.5 5.5,21 8,13.5 2,9 9.5,9"/></svg>

    <!-- Middle-right: cassette tape -->

    <!-- Lower-left: Memphis triangle -->
    <svg class="sticker-bg float glow" style="bottom: 18%; left: 5%; --r: -5deg; --glow: #FF1493; width: 46px; animation-delay: -1.5s;" viewBox="0 0 24 24" fill="#FF1493"><polygon points="12,3 22,21 2,21"/></svg>

    <!-- Lower-right: neon heart -->
    <svg class="sticker-bg float glow" style="bottom: 20%; right: 5%; --r: 8deg; --glow: #00F0FF; width: 40px; animation-delay: -4s;" viewBox="0 0 24 24" fill="#00F0FF"><path d="M12 21s-8-5-8-11a5 5 0 0 1 9-3 5 5 0 0 1 9 3c0 6-8 11-8 11Z"/></svg>

    <!-- Side: small circles -->

    <svg class="sticker-bg float glow" style="top: 52%; right: 3%; --r: -10deg; --glow: #9D00FF; width: 24px; animation-delay: -5s;" viewBox="0 0 24 24" fill="#9D00FF"><polygon points="12,2 14.5,9 22,9 16,13.5 18.5,21 12,16.5 5.5,21 8,13.5 2,9 9.5,9"/></svg>

    <!-- HEADER -->
    <div class="top-label">De volta aos</div>

    <!-- VITROLA -->
    <div class="vitrola-wrap">

      <div class="card-inner">

        <svg class="card-corner tl" viewBox="0 0 24 24" fill="#FFE500" style="filter: drop-shadow(0 0 4px #FFE500); transform: rotate(-10deg);"><polygon points="13,2 4,14 11,14 9,22 20,9 13,9"/></svg>

        <!-- Corner: top-right star -->
        <svg class="card-corner tr" viewBox="0 0 24 24" fill="#FF2A2A" style="filter: drop-shadow(0 0 4px #FF2A2A); transform: rotate(10deg);"><polygon points="12,2 14.5,9 22,9 16,13.5 18.5,21 12,16.5 5.5,21 8,13.5 2,9 9.5,9"/></svg>

        <!-- Corner: bottom-left triangle -->

        <!-- Corner: bottom-right teal disc -->

          <div style="background: #FFE500; color: #FFE500; width: 16px;"></div>
          <div style="background: #00F0FF; color: #00F0FF; width: 10px;"></div>
        </div>

            <div class="card-date-time">SÁB · 19:30H</div>
          </div>

  <script>
    const vitrola = document.getElementById('vitrola');
    const tapHint = document.getElementById('tapHint');
    const overlay = document.getElementById('overlay');

    const discoColors = ['#FF2A2A', '#FF7F00', '#FFE500', '#00F0FF', '#F5E6CA', '#FF1493', '#9D00FF'];

    function fireConfetti() {
      confetti({
        particleCount: 180,
        spread: 100,
        startVelocity: 55,
        origin: { x: 0.5, y: 0.55 },
        colors: discoColors,
        shapes: ['square', 'circle'],
        scalar: 1.3,
        ticks: 250,
      });
      setTimeout(() => {
        confetti({
          particleCount: 80, angle: 60, spread: 60,
          origin: { x: 0, y: 0.7 }, colors: discoColors, scalar: 1.1,
        });
        confetti({
          particleCount: 80, angle: 120, spread: 60,
          origin: { x: 1, y: 0.7 }, colors: discoColors, scalar: 1.1,
        });
      }, 200);
      let rainCount = 0;
      const rain = setInterval(() => {
        confetti({
          particleCount: 25, startVelocity: 25, spread: 360,
          origin: { x: Math.random(), y: 0 },
          colors: discoColors, gravity: 1.1, scalar: 1, ticks: 200,
        });
        rainCount++;
        if (rainCount >= 5) clearInterval(rain);
      }, 350);
    }

    function playVitrola() {
      if (vitrola.classList.contains('opening')) return;
      vitrola.classList.add('opening');
      tapHint.classList.add('hide');
      setTimeout(fireConfetti, 600);
      setTimeout(() => overlay.classList.add('show'), 950);
    }

    vitrola.addEventListener('click', playVitrola);
    vitrola.addEventListener('touchstart', (e) => { e.preventDefault(); playVitrola(); }, { passive: false });
    vitrola.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        playVitrola();
      }
    });
  </script>
